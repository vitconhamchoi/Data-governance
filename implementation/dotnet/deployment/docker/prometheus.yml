global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'datagovernance-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'datagovernance-api'
    static_configs:
      - targets: ['datagovernance-api:8080']
    metrics_path: '/metrics'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
