version: 2

models:
  - name: mart_user_orders
    description: Joined view of users and their orders
    columns:
      - name: user_id
        description: User identifier
      - name: user_name
        description: User name
      - name: email
        description: User email (PII)
        tags: ["pii"]
      - name: total_orders
        description: Total number of orders per user
      - name: total_amount
        description: Total order amount per user
