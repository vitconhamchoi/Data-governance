server:
  port: 8080

spring:
  application:
    name: policy-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/datagovernance}
    username: ${SPRING_DATASOURCE_USERNAME:dguser}
    password: ${SPRING_DATASOURCE_PASSWORD:dgpassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    com.datagovernance: INFO
