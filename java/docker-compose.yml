version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: dg-postgres
    environment:
      POSTGRES_USER: dguser
      POSTGRES_PASSWORD: dgpassword
      POSTGRES_DB: datagovernance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dguser -d datagovernance"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dg-network

  minio:
    image: minio/minio:latest
    container_name: dg-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dg-network

  trino:
    image: trinodb/trino:435
    container_name: dg-trino
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dg-network

  datahub-gms:
    image: acryldata/datahub-gms:v0.13.3
    container_name: dg-datahub-gms
    environment:
      EBEAN_DATASOURCE_USERNAME: dguser
      EBEAN_DATASOURCE_PASSWORD: dgpassword
      EBEAN_DATASOURCE_HOST: postgres
      EBEAN_DATASOURCE_URL: jdbc:postgresql://postgres:5432/datagovernance
      KAFKA_BOOTSTRAP_SERVER: ""
      DATAHUB_METADATA_SERVICE_AUTH_ENABLED: "false"
    ports:
      - "9002:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dg-network

  policy-service:
    build:
      context: ./services/policy-service
      dockerfile: Dockerfile
    container_name: dg-policy-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/datagovernance
      SPRING_DATASOURCE_USERNAME: dguser
      SPRING_DATASOURCE_PASSWORD: dgpassword
      AI_LLM_BASE_URL: ${AI_LLM_BASE_URL:-https://api.openai.com}
      AI_LLM_API_KEY: ${AI_LLM_API_KEY:-}
      AI_LLM_MODEL: ${AI_LLM_MODEL:-gpt-4o-mini}
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dg-network

  query-gateway:
    build:
      context: ./services/query-gateway
      dockerfile: Dockerfile
    container_name: dg-query-gateway
    environment:
      TRINO_URL: jdbc:trino://trino:8080/postgresql/public
      TRINO_USER: admin
      POLICY_SERVICE_URL: http://policy-service:8080
      DATAHUB_GRAPHQL_URL: http://datahub-gms:8080/api/graphql
      DATAHUB_TOKEN: ${DATAHUB_TOKEN:-}
      DATAHUB_DATASET_PLATFORM: ${DATAHUB_DATASET_PLATFORM:-trino}
      DATAHUB_DATASET_ENV: ${DATAHUB_DATASET_ENV:-PROD}
      AI_LLM_BASE_URL: ${AI_LLM_BASE_URL:-https://api.openai.com}
      AI_LLM_API_KEY: ${AI_LLM_API_KEY:-}
      AI_LLM_MODEL: ${AI_LLM_MODEL:-gpt-4o-mini}
    ports:
      - "8083:8080"
    depends_on:
      - trino
      - policy-service
      - datahub-gms
    networks:
      - dg-network

  ai-classifier:
    build:
      context: ./services/ai-classifier
      dockerfile: Dockerfile
    container_name: dg-ai-classifier
    environment:
      TRINO_URL: jdbc:trino://trino:8080/postgresql/public
      TRINO_USER: admin
      POLICY_SERVICE_URL: http://policy-service:8080
      DATAHUB_GRAPHQL_URL: http://datahub-gms:8080/api/graphql
      DATAHUB_TOKEN: ${DATAHUB_TOKEN:-}
      AI_LLM_BASE_URL: ${AI_LLM_BASE_URL:-https://api.openai.com}
      AI_LLM_API_KEY: ${AI_LLM_API_KEY:-}
      AI_LLM_MODEL: ${AI_LLM_MODEL:-gpt-4o-mini}
    ports:
      - "8084:8080"
    depends_on:
      - trino
      - policy-service
      - datahub-gms
    networks:
      - dg-network

  ai-assistant:
    build:
      context: ./services/ai-assistant
      dockerfile: Dockerfile
    container_name: dg-ai-assistant
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/datagovernance
      SPRING_DATASOURCE_USERNAME: dguser
      SPRING_DATASOURCE_PASSWORD: dgpassword
      DATAHUB_GRAPHQL_URL: http://datahub-gms:8080/api/graphql
      DATAHUB_TOKEN: ${DATAHUB_TOKEN:-}
      AI_LLM_BASE_URL: ${AI_LLM_BASE_URL:-https://api.openai.com}
      AI_LLM_API_KEY: ${AI_LLM_API_KEY:-}
      AI_LLM_MODEL: ${AI_LLM_MODEL:-gpt-4o-mini}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-text-embedding-3-small}
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
      datahub-gms:
        condition: service_started
    networks:
      - dg-network

volumes:
  postgres_data:
  minio_data:

networks:
  dg-network:
    driver: bridge
