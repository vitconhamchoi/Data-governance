server:
  port: 8080

spring:
  application:
    name: ai-classifier

trino:
  jdbc:
    url: ${TRINO_URL:jdbc:trino://localhost:8080/postgresql/public}
    user: ${TRINO_USER:admin}

policy:
  service:
    url: ${POLICY_SERVICE_URL:http://localhost:8082}

datahub:
  graphql:
    url: ${DATAHUB_GRAPHQL_URL:http://localhost:9002/api/graphql}
  token: ${DATAHUB_TOKEN:}
  dataset:
    platform: ${DATAHUB_DATASET_PLATFORM:trino}
    env: ${DATAHUB_DATASET_ENV:PROD}

ai:
  llm:
    base-url: ${AI_LLM_BASE_URL:https://api.openai.com}
    api-key: ${AI_LLM_API_KEY:}
    model: ${AI_LLM_MODEL:gpt-4o-mini}

logging:
  level:
    com.datagovernance: INFO
