apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: datagovernance-ingress
  namespace: datagovernance
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.datagovernance.example.com
    secretName: datagovernance-tls
  rules:
  - host: api.datagovernance.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: datagovernance-api-service
            port:
              number: 80
