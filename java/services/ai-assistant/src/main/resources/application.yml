server:
  port: 8080

spring:
  application:
    name: ai-assistant
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/datagovernance}
    username: ${SPRING_DATASOURCE_USERNAME:dguser}
    password: ${SPRING_DATASOURCE_PASSWORD:dgpassword}
    driver-class-name: org.postgresql.Driver

datahub:
  graphql:
    url: ${DATAHUB_GRAPHQL_URL:http://localhost:9002/api/graphql}
  token: ${DATAHUB_TOKEN:}

ai:
  llm:
    base-url: ${AI_LLM_BASE_URL:https://api.openai.com}
    api-key: ${AI_LLM_API_KEY:}
    model: ${AI_LLM_MODEL:gpt-4o-mini}
  embedding:
    model: ${AI_EMBEDDING_MODEL:text-embedding-3-small}

logging:
  level:
    com.datagovernance: INFO
